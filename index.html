<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>EIKO ULTRA GOD ONLINE 🔥</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle,#000,#020b2e,#000);
    color:white;
    text-align:center;
}

h1{
    color:#00ffcc;
    text-shadow:0 0 30px #00ffcc;
}

.menu{
    margin:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ffcc;
}

canvas{
    background:#111;
    border:3px solid #00ffcc;
    box-shadow:0 0 50px #00ffcc;
    display:block;
    margin:10px auto;
}

#ui{
    font-size:18px;
}

.screen{
    display:none;
}

.active{
    display:block;
}
</style>
</head>

<body>

<h1>👑 ULTRA GOD ONLINE MODE 👑</h1>

<div class="menu">
<button onclick="show('menu')">🏠 Menu</button>
<button onclick="show('game')">🎮 Play</button>
</div>

<div id="menu" class="screen active">
<h2>🔥 EIKO ARCADE ONLINE</h2>
<p>اختار Play و دخل اللعبة 💎</p>
</div>

<div id="game" class="screen">

<div id="ui">
Score: 0 | Best: 0 | Speed: 1
</div>

<canvas id="c" width="500" height="400"></canvas>

<button onclick="startGame()">▶ Start</button>
<button onclick="restart()">🔄 Restart</button>

</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let player, obs, score=0, best=localStorage.getItem("best")||0;
let speed=2;
let running=false;

function show(s){
    document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
    document.getElementById(s).classList.add("active");
}

// ================= GAME =================
function startGame(){
    player={x:60,y:300,w:30,h:30,vy:0,gravity:0.6,jump:-10};
    obs=[];
    score=0;
    speed=2;
    running=true;
}

function restart(){
    startGame();
}

// ================= LOOP =================
function loop(){
    ctx.clearRect(0,0,500,400);

    if(running){
        speed = 2 + Math.floor(score/5);

        player.vy += player.gravity;
        player.y += player.vy;

        if(player.y>300){player.y=300;player.vy=0;}

        ctx.fillStyle="#00ffcc";
        ctx.fillRect(player.x,player.y,player.w,player.h);

        if(Math.random()<0.02){
            obs.push({x:500,y:320});
        }

        ctx.fillStyle="red";

        obs.forEach(o=>{
            o.x -= speed;
            ctx.fillRect(o.x,o.y,20,60);

            if(
                player.x < o.x+20 &&
                player.x+30 > o.x &&
                player.y < 380 &&
                player.y+30 > 320
            ){
                gameOver();
            }

            if(o.x===60) score++;
        });

        document.getElementById("ui").innerText=
        `Score: ${score} | Best: ${best} | Speed: ${speed}`;
    }

    requestAnimationFrame(loop);
}

// ================= GAME OVER =================
function gameOver(){
    running=false;

    if(score>best){
        best=score;
        localStorage.setItem("best",best);
    }

    alert("💀 GAME OVER | Score: "+score);
}

// ================= CONTROLS =================
document.addEventListener("keydown",e=>{
    if(e.code==="Space" && player.y===300){
        player.vy = player.jump;
    }
});

startGame();
loop();
</script>

</body>
</html>
