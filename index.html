<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO WOW ⚡</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at center,#020617,#000);
    overflow:hidden;
    font-family:sans-serif;
}
canvas{display:block}
#ui{
    position:absolute;top:10px;width:100%;
    display:flex;justify-content:space-around;
    color:#0ff;font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">
<div>SCORE: <span id="sc">0</span></div>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");
let w=innerWidth,h=innerHeight;
c.width=w;c.height=h;

let player={x:w/2,y:h-80};
let bullets=[],enemies=[],particles=[],stars=[];
let score=0,shake=0;

// 🌌 Stars Background
for(let i=0;i<150;i++){
stars.push({x:Math.random()*w,y:Math.random()*h,s:Math.random()*2});
}

function drawStars(){
stars.forEach(s=>{
s.y+=s.s*1.5;
if(s.y>h){s.y=0;s.x=Math.random()*w;}

ctx.fillStyle="white";
ctx.fillRect(s.x,s.y,s.s,s.s);
});
}

// 💥 Explosion
function explosion(x,y){
shake=15;
for(let i=0;i<30;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
life:1
});
}
}

// 🎯 Shoot (manual)
function shoot(){
bullets.push({x:player.x,y:player.y});
}

// 🧠 Enemy
function spawnEnemy(){
enemies.push({
x:Math.random()*w,
y:-20,
speed:2+Math.random()*2
});
}

function update(){

// bullets
bullets.forEach((b,i)=>{
b.y-=10;
if(b.y<0)bullets.splice(i,1);
});

// enemies
if(Math.random()<0.03)spawnEnemy();

enemies.forEach((e,ei)=>{
e.y+=e.speed;

// hit
bullets.forEach((b,bi)=>{
if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
explosion(e.x,e.y);
enemies.splice(ei,1);
bullets.splice(bi,1);
score+=100;
}
});

// player hit
if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
alert("GAME OVER");
location.reload();
}
});

// particles
particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life-=0.02;
if(p.life<=0)particles.splice(i,1);
});

document.getElementById("sc").innerText=score;
}

function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,w,h);

ctx.save();

// shake
if(shake>0){
ctx.translate(Math.random()*shake-shake/2,Math.random()*shake-shake/2);
shake*=0.9;
}

// stars
drawStars();

// bullets (laser)
bullets.forEach(b=>{
ctx.shadowBlur=20;
ctx.shadowColor="#0ff";

ctx.beginPath();
ctx.moveTo(b.x,b.y);
ctx.lineTo(b.x,b.y+30);
ctx.strokeStyle="#0ff";
ctx.lineWidth=3;
ctx.stroke();
});

// enemies
ctx.fillStyle="red";
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,20,20);
});

// particles
particles.forEach(p=>{
ctx.globalAlpha=p.life;
ctx.fillStyle="#ff0055";
ctx.fillRect(p.x,p.y,3,3);
});
ctx.globalAlpha=1;

// player
ctx.shadowBlur=20;
ctx.shadowColor="#0ff";
ctx.fillStyle="#0ff";
ctx.beginPath();
ctx.moveTo(player.x,player.y-15);
ctx.lineTo(player.x+15,player.y+15);
ctx.lineTo(player.x-15,player.y+15);
ctx.fill();

ctx.restore();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// 🎮 Controls
window.addEventListener("mousemove",e=>{
player.x=e.clientX;
});
window.addEventListener("touchmove",e=>{
player.x=e.touches[0].clientX;
});

// 🔥 CLICK SHOOT
window.addEventListener("mousedown",shoot);
window.addEventListener("touchstart",shoot);

</script>

</body>
</html>
