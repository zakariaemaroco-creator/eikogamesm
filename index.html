<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eiko Games 👑 TOP 1</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --green:#22c55e;
}

.light {
  --bg:#f1f5f9;
  --card:#fff;
  --text:#000;
}

body {
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--green);
}

/* SEARCH */
.search {
  text-align:center;
  padding:20px;
}

.search input {
  width:80%;
  padding:12px;
  border-radius:25px;
  border:none;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  position:relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* IMAGE */
.thumb {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay {
  opacity:1;
}

.play {
  background:var(--green);
  border:none;
  padding:10px 20px;
  border-radius:10px;
}

/* TITLE */
.title {
  padding:10px;
  text-align:center;
}

/* BADGE */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

/* FAVORITE */
.fav {
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
  cursor:pointer;
}

/* PLAYER */
#player {
  position:fixed;
  inset:0;
  background:black;
  display:none;
}

#player iframe {
  width:100%;
  height:100%;
  border:none;
}

#close {
  position:absolute;
  top:20px;
  right:20px;
  background:red;
  color:white;
  border:none;
  padding:10px;
}

/* NO */
#no {
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<header>
<h2>👑 Eiko Games</h2>
<button onclick="toggleMode()" id="mode">🌙</button>
</header>

<div class="search">
<input type="text" placeholder="ابحث..." onkeyup="search(this.value)">
</div>

<div class="grid">

<!-- GAME -->
<div class="card" data-name="subway">
<span class="badge">🔥</span>
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/7yUvePI.jpg" class="thumb">

<div class="overlay">
<button class="play" onclick="playGame(event,'https://html5.gamedistribution.com/3938449c286e41429976722238495a43/')">▶️ Play</button>
</div>

<div class="title">Subway</div>
</div>

<!-- GAME -->
<div class="card" data-name="2048">
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/T8pQK6G.png" class="thumb">

<div class="overlay">
<button class="play" onclick="playGame(event,'https://play2048.co/')">▶️ Play</button>
</div>

<div class="title">2048</div>
</div>

</div>

<div id="no">😅 لا توجد نتائج</div>

<!-- PLAYER -->
<div id="player">
<button id="close" onclick="closeGame()">❌</button>
<iframe id="gameFrame"></iframe>
</div>

<script>

/* PLAY */
function playGame(e,src){
  e.stopPropagation();
  document.getElementById("player").style.display="block";
  document.getElementById("gameFrame").src=src;
}

/* CLOSE */
function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("gameFrame").src="";
}

/* SEARCH */
function search(val){
  val=val.toLowerCase();
  let found=false;

  document.querySelectorAll(".card").forEach(card=>{
    if(card.dataset.name.includes(val)){
      card.style.display="block";
      found=true;
    } else {
      card.style.display="none";
    }
  });

  document.getElementById("no").style.display=found?"none":"block";
}

/* FAVORITE */
function fav(e,el){
  e.stopPropagation();
  el.innerText = el.innerText==="🤍" ? "❤️" : "🤍";
}

/* MODE */
function toggleMode(){
  document.body.classList.toggle("light");
  localStorage.setItem("mode",document.body.classList.contains("light")?"light":"dark");
}

/* LOAD MODE */
if(localStorage.getItem("mode")==="light"){
  document.body.classList.add("light");
}

</script>

</body>
</html>
