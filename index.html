<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO ULTRA GOD 🔥</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body{
    margin:0;
    background:#02000a;
    font-family:Orbitron;
    overflow:hidden;
    color:white;
}

/* MENU */
#menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle,#000,#020b2e);
}

.btn{
    padding:20px 40px;
    margin:10px;
    background:#111;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 0 20px #0ff;
    transition:0.3s;
}
.btn:hover{transform:scale(1.1);}

/* UI */
#ui{
    position:absolute;
    top:20px;
    left:20px;
    font-size:20px;
    text-shadow:0 0 10px #0ff;
    display:none;
}

canvas{display:none;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h1>🔥 EIKO ULTRA 🔥</h1>
    <div class="btn" onclick="startGame('shooter')">🔫 SHOOTER</div>
    <div class="btn" onclick="startGame('car')">🚗 CAR GAME</div>
</div>

<div id="ui">
    SCORE: <span id="sc">0</span><br>
    HIGH: <span id="high">0</span>
</div>

<canvas id="c"></canvas>

<!-- SOUNDS -->
<audio id="shootSound" src="https://assets.mixkit.co/sfx/preview/mixkit-laser-gun-shot-1670.mp3"></audio>
<audio id="boomSound" src="https://assets.mixkit.co/sfx/preview/mixkit-explosion-1684.mp3"></audio>
<audio id="music" src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" loop></audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let w = innerWidth, h = innerHeight;
c.width=w; c.height=h;

let game="menu";
let score=0;
let high=localStorage.getItem("high")||0;
document.getElementById("high").innerText=high;

// sounds
const shootSound = document.getElementById("shootSound");
const boomSound = document.getElementById("boomSound");
const music = document.getElementById("music");

// ---------- START GAME ----------
function startGame(type){
    game=type;
    document.getElementById("menu").style.display="none";
    document.getElementById("ui").style.display="block";
    c.style.display="block";
    music.play();
    init();
}

// ---------- COMMON ----------
let player, bullets, enemies, obstacles;
let mouse={x:w/2,y:h-100};

// ---------- INIT ----------
function init(){
    score=0;
    bullets=[]; enemies=[]; obstacles=[];
    player={x:w/2,y:h-100,w:40,h:40};
}

// ---------- SHOOTER ----------
function shooterUpdate(){
    player.x += (mouse.x-player.x)*0.2;

    if(Math.random()<0.05){
        enemies.push({x:Math.random()*w,y:-50,size:20});
    }

    bullets.push({x:player.x,y:player.y,v:-10});
    shootSound.currentTime=0; shootSound.play();

    bullets.forEach(b=>b.y+=b.v);

    enemies.forEach(e=>{
        e.y+=4;

        bullets.forEach(b=>{
            if(Math.hypot(b.x-e.x,b.y-e.y)<20){
                boomSound.play();
                score+=100;
                e.y=9999;
            }
        });

        if(Math.hypot(player.x-e.x,player.y-e.y)<30){
            gameOver();
        }
    });
}

// ---------- CAR ----------
let roadX=150;
let targetX=w/2;

function carUpdate(){
    player.x += (targetX-player.x)*0.2;

    if(Math.random()<0.03){
        obstacles.push({x:roadX+Math.random()*200,y:-100});
    }

    obstacles.forEach(o=>{
        o.y+=6;

        if(
            player.x<o.x+40 &&
            player.x+40>o.x &&
            player.y<o.y+80 &&
            player.y+40>o.y
        ){
            gameOver();
        }
    });

    score++;
}

// ---------- DRAW ----------
function draw(){
    ctx.clearRect(0,0,w,h);

    if(game==="shooter"){
        ctx.fillStyle="cyan";
        ctx.fillRect(player.x,player.y,10,20);

        bullets.forEach(b=>{
            ctx.fillRect(b.x,b.y,4,10);
        });

        enemies.forEach(e=>{
            ctx.fillStyle="red";
            ctx.beginPath();
            ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
            ctx.fill();
        });
    }

    if(game==="car"){
        ctx.fillStyle="#222";
        ctx.fillRect(roadX,0,300,h);

        ctx.fillStyle="red";
        ctx.fillRect(player.x,player.y,40,80);

        ctx.fillStyle="yellow";
        obstacles.forEach(o=>{
            ctx.fillRect(o.x,o.y,40,80);
        });
    }

    document.getElementById("sc").innerText=score;
}

// ---------- GAME LOOP ----------
function loop(){
    if(game==="shooter") shooterUpdate();
    if(game==="car") carUpdate();

    if(game!=="menu") draw();

    requestAnimationFrame(loop);
}
loop();

// ---------- GAME OVER ----------
function gameOver(){
    if(score>high){
        localStorage.setItem("high",score);
    }
    alert("GAME OVER\nScore: "+score);
    location.reload();
}

// ---------- CONTROLS ----------
window.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    targetX=e.clientX;
});

window.addEventListener("touchmove",e=>{
    mouse.x=e.touches[0].clientX;
    targetX=e.touches[0].clientX;
});
</script>

</body>
</html>
