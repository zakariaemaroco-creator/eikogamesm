<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO ELITE PRO 🔥</title>
<style>
    :root { --neon: #00ffcc; --danger: #ff0055; }
    body {
        margin: 0; background: #020205; color: white;
        font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex; justify-content: center; align-items: center;
        height: 100vh; overflow: hidden;
    }
    #game-container {
        position: relative; width: 400px; height: 600px;
        border: 2px solid rgba(0, 255, 204, 0.3);
        box-shadow: 0 0 40px rgba(0, 0, 0, 1);
    }
    canvas { display: block; background: #000; cursor: none; }
    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
        display: flex; justify-content: center; align-items: center;
        flex-direction: column; z-index: 20; transition: 0.5s;
    }
    #stats {
        position: absolute; top: 20px; left: 0; width: 100%;
        pointer-events: none; display: flex; justify-content: space-around;
        font-weight: 900; font-size: 20px; color: var(--neon); letter-spacing: 2px;
    }
    button {
        padding: 15px 45px; font-size: 18px; background: transparent;
        color: var(--neon); border: 2px solid var(--neon);
        cursor: pointer; font-weight: bold; letter-spacing: 2px;
        transition: 0.3s; border-radius: 4px;
    }
    button:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
    .wasted { color: var(--danger); text-shadow: 0 0 20px var(--danger); font-size: 3rem; }
</style>
</head>
<body>

<div id="game-container">
    <div id="stats">
        <span>SCORE: <span id="sVal">0</span></span>
        <span>LVL: <span id="lVal">1</span></span>
    </div>

    <div id="menu" class="overlay">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">EIKO <span style="color:var(--neon)">PRO</span></h1>
        <button onclick="startGame()">ENGAGE</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display:none;">
        <h1 class="wasted">ELIMINATED</h1>
        <p id="finalScore" style="margin-bottom: 20px;"></p>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <canvas id="c" width="400" height="600"></canvas>
</div>

<audio id="bgMusic" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="hitSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_2c4c36c51f.mp3"></audio>

<script>
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const sVal = document.getElementById("sVal"), lVal = document.getElementById("lVal");
const music = document.getElementById("bgMusic"), hitSound = document.getElementById("hitSound");

let gameActive = false, score = 0, speed = 4, level = 1;
let obstacles = [], particles = [], stars = [];

// Create Stars for background
for(let i=0; i<50; i++) stars.push({x: Math.random()*400, y: Math.random()*600, s: Math.random()*2});

const player = { x: 185, y: 530, w: 30, h: 30, targetX: 185 };

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.clientX - rect.left - player.w/2;
});

function startGame() {
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    music.volume = 0.3;
    music.play();
    animate();
}

function createParticle(x, y) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 1.0, color: i % 2 == 0 ? "#00ffcc" : "#fff"
        });
    }
}

function update() {
    if (!gameActive) return;

    // Background Stars
    stars.forEach(st => {
        st.y += speed * 0.5;
        if(st.y > 600) st.y = 0;
    });

    player.x += (player.targetX - player.x) * 0.15;
    score++;
    if(score % 1000 === 0) { level++; speed += 0.8; }

    if (Math.random() < 0.05 + (level*0.01)) {
        let w = Math.random()*70 + 30;
        obstacles.push({ x: Math.random()*(400-w), y: -40, w: w, h: 12, speed: speed + Math.random() });
    }

    obstacles.forEach((o, i) => {
        o.y += o.speed;
        if (player.x < o.x + o.w && player.x + player.w > o.x && 
            player.y < o.y + o.h && player.y + player.h > o.y) {
            explode();
        }
        if (o.y > 600) obstacles.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    sVal.innerText = Math.floor(score/10);
    lVal.innerText = level;
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 400, 600);

    // Stars
    ctx.fillStyle = "#fff";
    stars.forEach(st => ctx.fillRect(st.x, st.y, st.s, st.s));

    // Player
    if(gameActive) {
        ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc";
        ctx.fillStyle = "#00ffcc";
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.w, player.h, 4);
        ctx.fill();
    }

    // Obstacles
    ctx.shadowBlur = 10; ctx.shadowColor = "#ff0055";
    ctx.fillStyle = "#ff0055";
    obstacles.forEach(o => {
        ctx.beginPath();
        ctx.roundRect(o.x, o.y, o.w, o.h, 2);
        ctx.fill();
    });

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
}

function animate() {
    update();
    draw();
    if (gameActive || particles.length > 0) requestAnimationFrame(animate);
}

function explode() {
    gameActive = false;
    hitSound.play();
    createParticle(player.x + 15, player.y + 15);
    setTimeout(() => {
        document.getElementById("finalScore").innerText = "FINAL SCORE: " + Math.floor(score/10);
        document.getElementById("gameOverScreen").style.display = "flex";
    }, 1000);
}
</script>
</body>
</html>
