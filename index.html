<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIKO ULTIMATE OP 🔥</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #050505;
            color: white;
            text-align: center;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid #00ffcc;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #000428, #000000);
            cursor: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
        }

        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 30px #00ffcc;
        }

        #stats {
            position: absolute;
            top: 15px;
            left: 15px;
            text-align: left;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">SCORE: 0<br>LEVEL: 1</div>
    
    <div id="menu" class="overlay">
        <h1>EIKO OP</h1>
        <button onclick="startGame()">Start Mission</button>
    </div>

    <div id="pauseMenu" class="overlay" style="display:none;">
        <h1>PAUSED</h1>
        <button onclick="togglePause()">Resume</button>
    </div>

    <canvas id="c" width="400" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const stats = document.getElementById("stats");

let gameActive = false;
let paused = false;
let score = 0;
let speed = 4;
let level = 1;
let obstacles = [];

const player = {
    x: 185,
    y: 530,
    w: 30,
    h: 30,
    color: "#00ffcc",
    targetX: 185 // For smooth lerping
};

// Controls
canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.clientX - rect.left - player.w / 2;
});

// Touch for Mobile
canvas.addEventListener("touchmove", (e) => {
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.touches[0].clientX - rect.left - player.w / 2;
    e.preventDefault();
}, {passive: false});

window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "p") togglePause();
});

function startGame() {
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    animate();
}

function togglePause() {
    if (!gameActive) return;
    paused = !paused;
    document.getElementById("pauseMenu").style.display = paused ? "flex" : "none";
}

function createObstacle() {
    const width = Math.random() * 60 + 30;
    obstacles.push({
        x: Math.random() * (canvas.width - width),
        y: -30,
        w: width,
        h: 15,
        speed: speed + (Math.random() * 1.5)
    });
}

function update() {
    if (!gameActive || paused) return;

    // Smooth movement (Lerp)
    player.x += (player.targetX - player.x) * 0.2;
    
    // Boundary check
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

    score++;
    speed += 0.001;

    // Level up system
    if (score % 800 === 0) {
        level++;
        speed += 0.5;
        // Flash effect for level up
        canvas.style.borderColor = "#fff";
        setTimeout(() => canvas.style.borderColor = "#00ffcc", 200);
    }

    if (Math.random() < 0.04 + (level * 0.005)) createObstacle();

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.y += o.speed;

        // Collision detection
        if (player.x < o.x + o.w &&
            player.x + player.w > o.x &&
            player.y < o.y + o.h &&
            player.y + player.h > o.y) {
            gameOver();
        }

        if (o.y > canvas.height) obstacles.splice(i, 1);
    }

    stats.innerHTML = `SCORE: ${Math.floor(score/10)}<br>LEVEL: ${level}`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Player
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    // Drawing a slightly rounded player for "Classy" look
    ctx.beginPath();
    ctx.roundRect(player.x, player.y, player.w, player.h, 5);
    ctx.fill();
    ctx.restore();

    // Draw Obstacles
    ctx.fillStyle = "#ff0055";
    obstacles.forEach(o => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff0055";
        ctx.beginPath();
        ctx.roundRect(o.x, o.y, o.w, o.h, 3);
        ctx.fill();
    });
}

function animate() {
    update();
    draw();
    if (gameActive) requestAnimationFrame(animate);
}

function gameOver() {
    gameActive = false;
    alert("💀 Mission Failed | Score: " + Math.floor(score/10) + " | Level: " + level);
    location.reload();
}
</script>
</body>
</html>
