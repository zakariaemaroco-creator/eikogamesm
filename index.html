<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EIKO PRO MAX 🚀</title>
<style>
:root{--neon:#00ffc3;--danger:#ff0055; --bg:#020205;}
body{margin:0;background:var(--bg);font-family:'Segoe UI', sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;color:#fff; user-select: none; touch-action: none;}
#game{width:100%;max-width:400px;height:100%;max-height:600px;position:relative;border-radius:15px;overflow:hidden;box-shadow:0 0 40px #00ffc344;background:#000}
canvas{display:block;width:100%;height:100%; cursor: crosshair;}
#ui{position:absolute;top:15px;width:100%;display:flex;justify-content:space-around;font-weight:bold;font-size:1.2rem;color:var(--neon); text-shadow: 0 0 10px var(--neon); z-index: 10; pointer-events: none;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index: 20;}
button{padding:15px 45px;font-size:1.2rem;border-radius:10px;border:2px solid var(--neon);background:rgba(0, 255, 195, 0.1);color:var(--neon);cursor:pointer;font-weight:bold;letter-spacing:2px;transition:0.3s;}
button:hover{background:var(--neon);color:#000;box-shadow:0 0 20px var(--neon);transform:scale(1.05);}
h1{letter-spacing:3px; margin-bottom: 30px;}
.wasted {color: var(--danger); text-shadow: 0 0 20px var(--danger); font-size: 2.5rem;}
</style>
</head>
<body>
<div id="game">
    <div id="ui">
        <span>SCORE: <span id="s">0</span></span>
        <span>BEST: <span id="b">0</span></span>
    </div>
    
    <div id="menu" class="overlay">
        <h1>EIKO <span style="color:var(--neon)">PRO MAX</span></h1>
        <button onclick="start()">PLAY</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display:none;">
        <h1 class="wasted">GAME OVER</h1>
        <p style="font-size: 1.5rem; margin-bottom: 20px;">SCORE: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <canvas id="c" width="400" height="600"></canvas>
</div>

<audio id="shoot" src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c5b3f3c92.mp3"></audio>
<audio id="boom" src="https://cdn.pixabay.com/audio/2022/03/10/audio_2c4c36c51f.mp3"></audio>

<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
let player = {x: 180, y: 520, w: 30, h: 30, skin: 0};
let bullets = [], enemies = [], particles = [];
let score = 0, best = localStorage.getItem('best') || 0;
document.getElementById('b').innerText = best;
let game = false;

const shootSound = document.getElementById('shoot');
const boom = document.getElementById('boom');

// دالة لتحديد موقع اللاعب بدقة
function movePlayer(clientX) {
    if(!game) return;
    const rect = c.getBoundingClientRect();
    const scaleX = c.width / rect.width;
    let newX = (clientX - rect.left) * scaleX - player.w / 2;
    player.x = Math.max(0, Math.min(c.width - player.w, newX));
}

// التحكم بالماوس (PC)
c.addEventListener('mousemove', e => movePlayer(e.clientX));

// التحكم باللمس (الهواتف)
c.addEventListener('touchmove', e => {
    e.preventDefault();
    movePlayer(e.touches[0].clientX);
});

// إطلاق النار (PC + الهواتف)
function fireBullet() {
    if(!game) return;
    bullets.push({x: player.x + 13, y: player.y});
    shootSound.currentTime = 0;
    shootSound.play().catch(()=>{});
}
c.addEventListener('click', fireBullet);
c.addEventListener('touchstart', (e) => {
    e.preventDefault();
    movePlayer(e.touches[0].clientX); // تحديث المكان قبل الإطلاق
    fireBullet();
});

function start() {
    document.getElementById('menu').style.display = 'none';
    game = true;
    loop();
}

function spawn() {
    if(Math.random() < 0.04 + (score * 0.0001)) { // زيادة الصعوبة تدريجياً
        let w = Math.random() * 40 + 20;
        enemies.push({x: Math.random() * (400 - w), y: -20, w: w, h: 20});
    }
}

function explode(x, y) {
    for(let i = 0; i < 25; i++) {
        particles.push({
            x: x + 10, y: y + 10, 
            vx: (Math.random() - 0.5) * 8, 
            vy: (Math.random() - 0.5) * 8, 
            life: 1,
            color: Math.random() > 0.5 ? '#ff0055' : '#ff8800'
        });
    }
    boom.currentTime = 0;
    boom.play().catch(()=>{});
}

function update() {
    score++;
    spawn();

    bullets.forEach(b => b.y -= 10); // تسريع الرصاص
    enemies.forEach(e => e.y += 4 + (score/1000)); // تسريع الأعداء مع الوقت

    // اصطدام الرصاص بالأعداء
    bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
            if(b.x < e.x + e.w && b.x + 4 > e.x && b.y < e.y + e.h && b.y + 10 > e.y) {
                explode(e.x, e.y);
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score += 50;
            }
        });
    });

    // اصطدام اللاعب بالأعداء (الخسارة)
    if(enemies.some(e => player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y)) {
        game = false;
        explode(player.x, player.y);
    }

    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
    particles = particles.filter(p => p.life > 0);

    bullets = bullets.filter(b => b.y > 0);
    enemies = enemies.filter(e => e.y < 600);

    document.getElementById('s').innerText = score;
}

function draw() {
    ctx.fillStyle = '#020205'; 
    ctx.fillRect(0, 0, 400, 600);

    // رسم اللاعب مع Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.skin == 0 ? '#00ffc3' : 'orange';
    ctx.fillStyle = player.skin == 0 ? '#00ffc3' : 'orange';
    if(game) ctx.fillRect(player.x, player.y, 30, 30);

    // رسم الرصاص
    ctx.shadowColor = '#fff';
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 12));

    // رسم الأعداء
    ctx.shadowColor = '#ff0055';
    ctx.fillStyle = '#ff0055';
    enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

    // رسم الانفجارات
    ctx.shadowBlur = 5;
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function loop() {
    if(!game && particles.length === 0) {
        if(score > best) { localStorage.setItem('best', score); } 
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOverScreen').style.display = 'flex';
        return;
    }
    update();
    draw();
    requestAnimationFrame(loop);
}

// تغيير السكين (1 و 2 من الكيبورد)
window.addEventListener('keydown', e => {
    if(e.key === '1') player.skin = 0;
    if(e.key === '2') player.skin = 1;
});
</script>
</body>
</html>
