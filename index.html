<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO ULTRA GOD ⚡</title>

<style>
body{margin:0;background:#000;color:white;text-align:center;font-family:sans-serif}
canvas{display:block;margin:auto;background:#000}
button{padding:10px 20px;margin:5px}
#ui{position:absolute;top:10px;width:100%;display:flex;justify-content:space-around;color:#0ff}
</style>
</head>

<body>

<div id="ui">
<div>Score: <span id="sc">0</span></div>
<div>Shield: <span id="shield">0</span></div>
</div>

<button onclick="init()">START</button>
<button onclick="useBomb()">💣</button>

<canvas id="c"></canvas>

<script>
let c=document.getElementById("c"),ctx=c.getContext("2d");
let w=innerWidth,h=innerHeight;
c.width=w;c.height=h;

let player,enemies=[],bullets=[],particles=[];
let score=0,game=true,shield=3,laser=false;

let shootSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
let boomSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

class Player{
constructor(){this.x=w/2;this.y=h-80;}
draw(){
ctx.shadowBlur=20;
ctx.shadowColor="#0ff";
ctx.fillStyle="#0ff";
ctx.fillRect(this.x-10,this.y-10,20,20);
}
}

function spawnEnemy(){
enemies.push({x:Math.random()*w,y:-20,hp:2});
}

function shoot(){
bullets.push({x:player.x,y:player.y});
shootSound.play();
}

function explosion(x,y){
boomSound.play();
for(let i=0;i<20;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:1
});
}
}

function useBomb(){
enemies=[];
explosion(player.x,player.y);
}

function update(){
if(!game)return;

if(Math.random()<0.03)spawnEnemy();

bullets.forEach((b,i)=>{
b.y-=10;
if(b.y<0)bullets.splice(i,1);
});

enemies.forEach((e,ei)=>{
e.y+=3;

bullets.forEach((b,bi)=>{
if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
e.hp--;
bullets.splice(bi,1);

if(e.hp<=0){
explosion(e.x,e.y);
enemies.splice(ei,1);
score+=100;
}
}
});

if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
if(shield>0){
shield--;
explosion(player.x,player.y);
enemies.splice(ei,1);
}else{
game=false;
alert("GAME OVER");
}
}
});
document.getElementById("sc").innerText=score;
document.getElementById("shield").innerText=shield;
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,w,h);

player.draw();

ctx.fillStyle="#0ff";
bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));

ctx.fillStyle="red";
enemies.forEach(e=>ctx.fillRect(e.x,e.y,20,20));

particles.forEach(p=>{
ctx.globalAlpha=p.life;
ctx.fillRect(p.x,p.y,3,3);
p.x+=p.vx;p.y+=p.vy;p.life-=0.02;
});
ctx.globalAlpha=1;
}

function loop(){
update();draw();
requestAnimationFrame(loop);
}

function init(){
player=new Player();
setInterval(shoot,200);
loop();
}

window.addEventListener("mousemove",e=>{
player.x=e.clientX;
});
</script>

</body>
</html>
