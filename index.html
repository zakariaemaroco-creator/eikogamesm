<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eiko Games 👑</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --green:#22c55e;
}

.light {
  --bg:#f1f5f9;
  --card:#fff;
  --text:#000;
}

body {
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--green);
}

/* SEARCH */
.search {
  text-align:center;
  padding:20px;
}

.search input {
  width:80%;
  padding:12px;
  border-radius:25px;
  border:none;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  position:relative;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* IMAGE */
.thumb {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay {
  opacity:1;
}

/* PLAY */
.play {
  background:var(--green);
  color:white;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
}

/* TITLE */
.title {
  padding:10px;
  text-align:center;
}

/* FAVORITE */
.fav {
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
  cursor:pointer;
}

/* NO */
#no {
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<header>
<h2>👑 Eiko Games</h2>
<button onclick="toggleMode()" id="mode">🌙</button>
</header>

<div class="search">
<input type="text" placeholder="ابحث عن لعبة..." onkeyup="search(this.value)">
</div>

<div class="grid">

<!-- GAME -->
<div class="card" data-name="subway">
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/7yUvePI.jpg" class="thumb">

<div class="overlay">
<a href="https://ubg100.github.io/games/subway-surfers/" target="_blank" class="play">▶️ Play</a>
</div>

<div class="title">Subway Surfers</div>
</div>

<!-- GAME -->
<div class="card" data-name="drift">
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/8Qf6F9G.jpg" class="thumb">

<div class="overlay">
<a href="https://ubg100.github.io/games/drift-boss/" target="_blank" class="play">▶️ Play</a>
</div>

<div class="title">Drift Boss</div>
</div>

<!-- GAME -->
<div class="card" data-name="2048">
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/T8pQK6G.png" class="thumb">

<div class="overlay">
<a href="https://play2048.co/" target="_blank" class="play">▶️ Play</a>
</div>

<div class="title">2048</div>
</div>

<!-- GAME -->
<div class="card" data-name="1v1">
<span class="fav" onclick="fav(event,this)">🤍</span>

<img src="https://i.imgur.com/3ZQ3Z6p.jpg" class="thumb">

<div class="overlay">
<a href="https://ubg100.github.io/games/1v1-lol/" target="_blank" class="play">▶️ Play</a>
</div>

<div class="title">1v1.LOL</div>
</div>

</div>

<div id="no">😅 لا توجد نتائج</div>

<script>

/* SEARCH */
function search(val){
  val = val.toLowerCase();
  let found=false;

  document.querySelectorAll(".card").forEach(card=>{
    if(card.dataset.name.includes(val)){
      card.style.display="block";
      found=true;
    } else {
      card.style.display="none";
    }
  });

  document.getElementById("no").style.display = found?"none":"block";
}

/* FAVORITE */
function fav(e,el){
  e.stopPropagation();
  el.innerText = el.innerText==="🤍" ? "❤️":"🤍";
}

/* MODE */
function toggleMode(){
  document.body.classList.toggle("light");
  localStorage.setItem("mode",document.body.classList.contains("light")?"light":"dark");
}

/* LOAD MODE */
if(localStorage.getItem("mode")==="light"){
  document.body.classList.add("light");
}

</script>

</body>
</html>
