<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO ULTIMATE OP 🔥</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle,#020b2e,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}
canvas{
    background:#000;
    border:3px solid #00ffcc;
    box-shadow:0 0 25px #00ffcc;
    margin-top:10px;
}
#menu, #pauseMenu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#000;
    padding:30px;
    border:2px solid #00ffcc;
}
button{
    padding:10px 20px;
    margin:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div id="menu">
<h1>🔥 EIKO OP 🔥</h1>
<button onclick="startGame()">▶️ Start</button>
</div>

<div id="pauseMenu" style="display:none;">
<h1>⏸️ Pause</h1>
<button onclick="resumeGame()">▶️ Resume</button>
</div>

<canvas id="c" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let gameActive=false;
let paused=false;
let score=0;
let speed=5;
let level=1;

const player={x:180,y:520,w:30,h:30,color:"#00ffcc"};
const obstacles=[];

document.addEventListener("keydown",(e)=>{
    if(e.key==="p"){
        paused=!paused;
        document.getElementById("pauseMenu").style.display=paused?"block":"none";
    }
});

// Mouse
canvas.addEventListener("mousemove",(e)=>{
    const rect=canvas.getBoundingClientRect();
    player.x=e.clientX-rect.left-player.w/2;
});

// Start
function startGame(){
    document.getElementById("menu").style.display="none";
    gameActive=true;
}

// Resume
function resumeGame(){
    paused=false;
    document.getElementById("pauseMenu").style.display="none";
}

// Obstacles
function createObstacle(){
    const size=Math.random()*50+20;
    obstacles.push({
        x:Math.random()*(canvas.width-size),
        y:-size,
        w:size,
        h:20,
        speed:speed
    });
}

// Update
function update(){
    if(!gameActive || paused) return;

    score++;
    speed+=0.002;

    if(score%500==0){
        level++;
        player.color="#"+Math.floor(Math.random()*16777215).toString(16);
    }

    if(Math.random()<0.05) createObstacle();

    obstacles.forEach((o,i)=>{
        o.y+=o.speed;

        if(player.x<o.x+o.w &&
           player.x+player.w>o.x &&
           player.y<o.y+o.h &&
           player.y+player.h>o.y){
            alert("💀 Game Over | Level "+level);
            location.reload();
        }

        if(o.y>canvas.height) obstacles.splice(i,1);
    });
}

// Draw
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.shadowBlur=15;
    ctx.shadowColor=player.color;
    ctx.fillStyle=player.color;
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="#ff0055";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x,o.y,o.w,o.h);
    });

    ctx.fillStyle="#fff";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("Level: "+level,10,40);

    requestAnimationFrame(()=>{
        update();
        draw();
    });
}

// Loop
draw();
</script>

</body>
</html>
