<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIKO ULTRA GOD ONLINE 🔥</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle,#000,#020b2e,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    color:#00ffcc;
    text-shadow:0 0 30px #00ffcc;
}

.menu{
    margin:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ffcc;
}

canvas{
    background:#111;
    border:3px solid #00ffcc;
    box-shadow:0 0 50px #00ffcc;
    display:block;
    margin:10px auto;
    max-width:95vw;
}

#ui{
    font-size:18px;
}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<h1>👑 ULTRA GOD ONLINE MODE 👑</h1>

<div class="menu">
<button onclick="show('menu')">🏠 Menu</button>
<button onclick="show('game')">🎮 Play</button>
<button onclick="restart()">🔄 Restart</button>
</div>

<div id="menu" class="screen active">
<h2>🔥 EIKO ARCADE ONLINE 🔥</h2>
<p>Space ولا click باش تنقز 💎</p>
</div>

<div id="game" class="screen">

<div id="ui">Score: 0 | Best: 0 | Speed: 2</div>

<canvas id="c" width="500" height="400"></canvas>

</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let player, obs;
let score = 0;
let best = localStorage.getItem("best") || 0;
let speed = 2;
let running = false;
let spawnTimer = 0;
let lastTime = 0;

// ================= MENU =================
function show(s){
    document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
    document.getElementById(s).classList.add("active");
}

// ================= GAME START =================
function startGame(){
    player = {
        x:60,
        y:300,
        w:30,
        h:30,
        vy:0,
        gravity:0.6,
        jump:-10
    };

    obs = [];
    score = 0;
    speed = 2;
    spawnTimer = 0;
    running = true;
}

function restart(){
    startGame();
}

// auto start
startGame();

// ================= LOOP (SMOOTH + FIXED) =================
function loop(time){

    let delta = time - lastTime;
    lastTime = time;

    ctx.clearRect(0,0,500,400);

    if(running){

        // 🔥 difficulty scaling
        speed = 2 + Math.floor(score / 4);

        // gravity
        player.vy += player.gravity;
        player.y += player.vy;

        if(player.y > 300){
            player.y = 300;
            player.vy = 0;
        }

        // draw player
        ctx.fillStyle="#00ffcc";
        ctx.fillRect(player.x,player.y,player.w,player.h);

        // spawn system (smooth + controlled)
        spawnTimer += delta;

        if(spawnTimer > 900){
            obs.push({x:500,y:320,w:20,h:60});
            spawnTimer = 0;
        }

        // obstacles
        ctx.fillStyle="red";

        for(let i=0;i<obs.length;i++){
            let o = obs[i];

            o.x -= speed;

            ctx.fillRect(o.x,o.y,o.w,o.h);

            // collision FIXED (real hitbox)
            if(
                player.x < o.x + o.w &&
                player.x + player.w > o.x &&
                player.y < o.y + o.h &&
                player.y + player.h > o.y
            ){
                gameOver();
            }

            // remove off-screen + score
            if(o.x + o.w < 0){
                obs.splice(i,1);
                score++;
                i--;
            }
        }

        document.getElementById("ui").innerText =
        `Score: ${score} | Best: ${best} | Speed: ${speed}`;
    }

    requestAnimationFrame(loop);
}

// ================= GAME OVER =================
function gameOver(){
    running = false;

    if(score > best){
        best = score;
        localStorage.setItem("best", best);
    }

    setTimeout(()=>{
        alert("💀 GAME OVER | Score: " + score);
    },100);
}

// ================= CONTROLS =================
document.addEventListener("keydown",e=>{
    if(e.code === "Space" && player.y === 300){
        player.vy = player.jump;
    }
});

document.addEventListener("click",()=>{
    if(player.y === 300){
        player.vy = player.jump;
    }
});

// start loop
requestAnimationFrame(loop);
</script>

</body>
</html>
